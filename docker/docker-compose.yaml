x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1-python3.10
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgres+psycopg2://airflow:airflow@postgres:5432/airflow_metadata
    - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AIRFLOW__CORE__LOGGING_LEVEL=INFO
    - GOOGLE_APPLICATION_CREDENTIALS=/opt/airflow/.config/gcloud/application_default_credentials.json
  volumes:
    - ../Airflow/dags:/opt/airflow/dags
    - ../Airflow/logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ${APPDATA:-$HOME/.config}/gcloud:/opt/airflow/.config/gcloud:ro
  depends_on:
    postgres:
      condition: service_healthy
    
services:
  postgres:
    image: postgres:15
    container_name: airflow_postgres_backend
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
    ports:
      - "5432:5432"
    volumes:
      - airflow_metadata_data:/var/lib/postgres/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    container_name: olist_airflow_webserver

  airflow_scheduler:
    <<: *airflow-common
    command: bash -c "airflow db migrate && airflow users create --username admin --firstname Fiol --lastname Fiol --role Admin \
              --email admin@example.com --password admin && airflow scheduler"
    container_name: olist_airflow_scheduler

volumes:
  airflow_metadata_data:
    driver: local