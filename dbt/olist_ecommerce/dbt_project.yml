
# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'olist_ecommerce'
version: '1.0.0'

# This setting configures which "profile" dbt uses for this project.
profile: 'olist_ecommerce'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

# In this example config, we tell dbt to build all models in the example/
# directory as views. These settings can be overridden in the individual model
# files using the `{{ config(...) }}` macro.
models:
  olist_ecommerce:
    # Config indicated by + and applies to all files under models/example/
    silver:
      +materialized: table
      +dataset: olist_ecommerce_data_silver
    gold:
      +materialized: view
      +dataset: olist_ecommerce_data_gold

vars:
  olist_customers_dataset: gs://olist_ecomerce_bucket/raw_data/olist_customers_dataset.csv
  olist_geolocation_dataset: gs://olist_ecomerce_bucket/raw_data/olist_geolocation_dataset.csv
  olist_order_items_dataset: gs://olist_ecomerce_bucket/raw_data/olist_order_items_dataset.csv
  olist_order_payments_dataset: gs://olist_ecomerce_bucket/raw_data/olist_order_payments_dataset.csv
  olist_order_reviews_dataset: gs://olist_ecomerce_bucket/raw_data/olist_order_reviews_dataset.csv
  olist_orders_dataset: gs://olist_ecomerce_bucket/raw_data/olist_orders_dataset.csv
  olist_products_dataset: gs://olist_ecomerce_bucket/raw_data/olist_products_dataset.csv
  olist_sellers_dataset: gs://olist_ecomerce_bucket/raw_data/olist_sellers_dataset.csv
  product_category_name_translation: gs://olist_ecomerce_bucket/raw_data/product_category_name_translation.csv